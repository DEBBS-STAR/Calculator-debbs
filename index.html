<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        function sub(){
            let v1 = f1.value;
            let v2 = f2.value;
            let r = v1 - v2;
            result.value = r;

        }
    
    
        function add(){
            let v1 = Number(f1.value);
            let v2 = Number(f2.value);
            let r = v1 + v2;
            result.value = r;

        }
    
        function mul(){
            let v1 = f1.value;
            let v2 = f2.value;
            let r = v1 * v2;
            result.value = r;

        }
    
        function div(){
            let v1 = f1.value;
            let v2 = f2.value;
            let r = v1 / v2;
            result.value = r;

        }
    </script>
</body>
    Value 1: <input type="text" id="f1"><br>
    Value 2: <input type="text" id="f2"><br>
    Result: <input type="text" id="result"><br>

    <button onclick="div()">/</button>
    <button onclick="mul()">*</button>
    <button onclick="add()">+</button>
    <button onclick="sub()">-</button>
</html>
